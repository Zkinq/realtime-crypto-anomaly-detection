<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto ML Pro Terminal</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        /* Modern Dark Theme Variables */
        :root {
            --bg-main: #0B0E14;
            --bg-card: #131722;
            --border-color: rgba(255, 255, 255, 0.08);
            --text-main: #E2E8F0;
            --text-muted: #94A3B8;
            --accent-green: #10B981;
            --accent-red: #EF4444;
            --accent-blue: #3B82F6;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg-main); 
            color: var(--text-main); 
            margin: 0; 
            padding: 0; 
            background-image: radial-gradient(circle at 50% -20%, #1e293b, transparent 50%);
        }

        .dashboard { max-width: 1500px; margin: 0 auto; padding: 30px 20px; }

        .header { 
            display: flex; justify-content: space-between; align-items: center; 
            background: rgba(19, 23, 34, 0.7); backdrop-filter: blur(12px);
            padding: 20px 30px; border-radius: 16px; border: 1px solid var(--border-color); 
            margin-bottom: 25px; box-shadow: 0 4px 30px rgba(0,0,0,0.1);
        }
        
        .header h2 { margin: 0; font-size: 22px; font-weight: 700; background: linear-gradient(90deg, #fff, #94A3B8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .controls { display: flex; align-items: center; gap: 20px; }

        select { 
            background-color: #1E293B; color: white; padding: 12px 40px 12px 20px; 
            border-radius: 10px; font-size: 15px; font-weight: 500; font-family: 'Inter';
            border: 1px solid #334155; outline: none; cursor: pointer; transition: 0.3s;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%2394A3B8%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
            background-repeat: no-repeat; background-position: right 15px top 50%; background-size: 12px auto;
        }
        select:hover, select:focus { border-color: var(--accent-blue); box-shadow: 0 0 15px rgba(59, 130, 246, 0.2); }

        .status { padding: 10px 20px; border-radius: 30px; font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; transition: 0.4s; }
        .status.disconnected { background: rgba(239, 68, 68, 0.1); color: var(--accent-red); border: 1px solid rgba(239, 68, 68, 0.3); }
        .status.connected { background: rgba(16, 185, 129, 0.1); color: var(--accent-green); border: 1px solid rgba(16, 185, 129, 0.3); box-shadow: 0 0 20px rgba(16, 185, 129, 0.2); }

        .grid-container { display: grid; grid-template-columns: 3fr 1fr; gap: 25px; }

        .card { 
            background-color: var(--bg-card); border-radius: 16px; 
            border: 1px solid var(--border-color); padding: 25px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .chart-header { margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between; }
        .chart-title { margin: 0; font-size: 18px; color: var(--text-muted); font-weight: 500; }
        .live-price { font-size: 32px; font-weight: 700; font-family: 'Inter', monospace; margin: 0; transition: color 0.3s; }

        .log-container { max-height: 600px; overflow-y: auto; padding-right: 5px; }
        .log-container::-webkit-scrollbar { width: 6px; }
        .log-container::-webkit-scrollbar-track { background: transparent; }
        .log-container::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }

        .log-item { 
            background: rgba(255,255,255,0.02); padding: 15px; margin-bottom: 10px; 
            border-radius: 10px; display: flex; justify-content: space-between; align-items: center;
            border-left: 4px solid var(--accent-blue); font-size: 14px; transition: transform 0.2s;
        }
        .log-item:hover { transform: translateX(5px); background: rgba(255,255,255,0.04); }
        .log-item .time { color: var(--text-muted); font-size: 12px; }
        
        .log-item.anomaly { 
            background: rgba(239, 68, 68, 0.05); border-left-color: var(--accent-red); 
            animation: pulse 2s infinite; 
        }
        .log-item.anomaly .price-tag { color: var(--accent-red); font-weight: 700; }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
    </style>
</head>
<body>

    <div class="dashboard">
        <div class="header">
            <h2>⚡ AI Pulse Terminal</h2>
            <div class="controls">
                <select id="coinSelector">
                    <option value="BTC-USD">Bitcoin (BTC)</option>
                    <option value="ETH-USD">Ethereum (ETH)</option>
                    <option value="BNB-USD">Binance Coin (BNB)</option>
                    <option value="SOL-USD">Solana (SOL)</option>
                    <option value="ADA-USD">Cardano (ADA)</option>
                    <option value="USDT-USD">Tether (USDT)</option>
                </select>
                <span id="connectionStatus" class="status disconnected">OFFLINE</span>
            </div>
        </div>

        <div class="grid-container">
            <div class="card">
                <div class="chart-header">
                    <p class="chart-title">Real-Time ML Analysis</p>
                    <p class="live-price" id="topPriceDisplay">$0.00</p>
                </div>
                <canvas id="priceChart" height="120"></canvas>
            </div>
            
            <div class="card">
                <h3 style="margin-top:0; color: var(--text-muted); font-size: 14px; text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid var(--border-color); padding-bottom: 15px;">System Alerts</h3>
                <div class="log-container" id="logContainer">
                    </div>
            </div>
        </div>
    </div>

    <script>
        const ctx = document.getElementById('priceChart').getContext('2d');
        const connectionStatus = document.getElementById('connectionStatus');
        const logContainer = document.getElementById('logContainer');
        const coinSelector = document.getElementById('coinSelector');
        const topPriceDisplay = document.getElementById('topPriceDisplay');
        
        let currentSymbol = coinSelector.value;

        // 🧠 YENİ SİSTEM: Tüm coinlerin geçmişini arka planda tutan dev hafıza
        const TICKERS = ['BTC-USD', 'ETH-USD', 'BNB-USD', 'SOL-USD', 'ADA-USD', 'USDT-USD'];
        const chartMemory = {};
        
        // Her coin için boş bir geçmiş listesi oluşturuyoruz
        TICKERS.forEach(ticker => {
            chartMemory[ticker] = { labels: [], data: [], colors: [], logs: [] };
        });

        let gradient = ctx.createLinearGradient(0, 0, 0, 400);
        gradient.addColorStop(0, 'rgba(16, 185, 129, 0.4)');
        gradient.addColorStop(1, 'rgba(16, 185, 129, 0.0)');

        let priceChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [{
                    label: `Price`,
                    data: [],
                    borderColor: '#10B981',
                    backgroundColor: gradient,
                    borderWidth: 2,
                    pointBackgroundColor: [],
                    pointBorderColor: '#131722',
                    pointBorderWidth: 2,
                    pointRadius: 5,
                    pointHoverRadius: 7,
                    fill: true,
                    tension: 0.4
                }]
            },
            options: {
                responsive: true,
                animation: { duration: 400 },
                interaction: { intersect: false, mode: 'index' },
                scales: {
                    x: { ticks: { color: '#94A3B8' }, grid: { color: 'rgba(255,255,255,0.05)', display: false } },
                    y: { ticks: { color: '#94A3B8', font: { family: 'monospace' } }, grid: { color: 'rgba(255,255,255,0.05)' } }
                },
                plugins: { 
                    legend: { display: false },
                    tooltip: { backgroundColor: '#1E293B', titleFont: { size: 14 }, bodyFont: { size: 14, family: 'monospace' }, padding: 12, cornerRadius: 8 }
                }
            }
        });

        // KULLANICI COIN DEĞİŞTİRDİĞİNDE ÇALIŞAN KOD
        coinSelector.addEventListener('change', (e) => {
            currentSymbol = e.target.value;
            
            // 1. Yeni seçilen coinin hafızadaki geçmişini doğrudan grafiğe yükle
            priceChart.data.labels = [...chartMemory[currentSymbol].labels];
            priceChart.data.datasets[0].data = [...chartMemory[currentSymbol].data];
            priceChart.data.datasets[0].pointBackgroundColor = [...chartMemory[currentSymbol].colors];
            priceChart.update();
            
            // 2. Büyük fiyat etiketini, hafızadaki son fiyata göre güncelle
            const len = chartMemory[currentSymbol].data.length;
            if (len > 0) {
                const lastPrice = chartMemory[currentSymbol].data[len - 1];
                const lastColor = chartMemory[currentSymbol].colors[len - 1];
                topPriceDisplay.textContent = `$${lastPrice.toLocaleString()}`;
                topPriceDisplay.style.color = lastColor;
            } else {
                topPriceDisplay.textContent = '$0.00';
                topPriceDisplay.style.color = '#E2E8F0';
            }

            // 3. Logları temizle (İstersen logları da hafızada tutabiliriz ama temizlemek daha şık duruyor)
            logContainer.innerHTML = '';
        });

        const ws = new WebSocket('ws://localhost:8000/ws');

        ws.onopen = () => {
            connectionStatus.textContent = '● LIVE STREAM';
            connectionStatus.className = 'status connected';
        };

        ws.onclose = () => {
            connectionStatus.textContent = 'OFFLINE';
            connectionStatus.className = 'status disconnected';
        };

        // SUNUCUDAN YENİ VERİ GELDİĞİNDE ÇALIŞAN KOD
        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            const sym = data.symbol;
            
            // Bilinmeyen bir sembol gelirse yoksay
            if(!chartMemory[sym]) return;

            const time = data.timestamp;
            const price = data.price;
            const isAnomaly = data.is_anomaly;
            const color = isAnomaly ? '#EF4444' : '#10B981';

            // ADIM 1: Gelen veriyi her halükarda ARKA PLAN HAFIZASINA yaz (Ekranda görünmese bile!)
            chartMemory[sym].labels.push(time);
            chartMemory[sym].data.push(price);
            chartMemory[sym].colors.push(color);

            // Hafızayı en fazla 40 veri ile sınırla (Tarayıcı çökmesin diye)
            if (chartMemory[sym].labels.length > 40) {
                chartMemory[sym].labels.shift();
                chartMemory[sym].data.shift();
                chartMemory[sym].colors.shift();
            }

            // ADIM 2: Eğer gelen veri, ŞU AN EKRANDA SEÇİLİ OLAN coin ise grafiği anında güncelle!
            if(sym === currentSymbol) {
                topPriceDisplay.textContent = `$${price.toLocaleString()}`;
                topPriceDisplay.style.color = color;

                // Grafiği hafızadan güncelliyoruz
                priceChart.data.labels = [...chartMemory[sym].labels];
                priceChart.data.datasets[0].data = [...chartMemory[sym].data];
                priceChart.data.datasets[0].pointBackgroundColor = [...chartMemory[sym].colors];
                priceChart.update();

                // Log Ekleme İşlemi
                if (isAnomaly) {
                    const logEntry = document.createElement('div');
                    logEntry.className = `log-item anomaly`;
                    logEntry.innerHTML = `
                        <div>
                            <div style="font-weight: 600; margin-bottom: 4px;">⚠️ ANOMALY DETECTED</div>
                            <div class="time">${time}</div>
                        </div>
                        <div class="price-tag" style="font-family: monospace; font-size: 15px;">$${price.toLocaleString()}</div>
                    `;
                    logContainer.prepend(logEntry);
                }
            }
        };
    </script>
</body>
</html>
